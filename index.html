  <script>
  // Compute base path from the current URL directory
  (function() {
    const path = window.location.pathname;
    window.FellerBasePath = path.substring(0, path.lastIndexOf('/') + 1);
  })();
</script>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feller - On-Rails Shooter</title>
  <base id="game-base">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: #ff3333;
      font-family: monospace;
    }
    #game-container {
      border: 2px solid #333;
    }
    #error-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="error-msg">
    <p style="font-size: 24px;">ERROR</p>
    <p id="error-details"></p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.85.0/dist/phaser.min.js"></script>
  <script>
    // Show error if something breaks
    window.onerror = function(msg) {
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('error-details').textContent = msg;
      return false;
    };

    // Dynamically load scripts with correct base path, then start the game
    function loadScript(src) {
      return new Promise(function(resolve, reject) {
        var s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }
    loadScript(window.FellerBasePath + 'js/GameConfig.js')
      .then(function() {
        return loadScript(window.FellerBasePath + 'scenes/BootScene.js');
      })
      .then(function() {
        return loadScript(window.FellerBasePath + 'scenes/GameScene.js');
      })
      .then(function() {
        return loadScript(window.FellerBasePath + 'scenes/GameOverScene.js');
      })
      .then(function() {
        var config = Object.assign({}, GameConfig, {
          parent: 'game-container',
          type: Phaser.AUTO,
          width: 800,
          height: 600,
          backgroundColor: '#0a0a1a',
          scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH
          },
          scene: [BootScene, GameScene, GameOverScene]
        });
        new Phaser.Game(config);
      })
      .catch(function(err) {
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('error-details').textContent = 'Failed to load game scripts: ' + err.message;
      });
  </script>
</body>
</html>
